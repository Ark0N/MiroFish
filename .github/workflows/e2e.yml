name: E2E Tests
on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Test tier to run (tier1, tier2, pipeline, all)'
        default: 'tier1'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/mirofish_neo4j
        ports:
          - "7474:7474"
          - "7687:7687"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v3

      - name: Install backend + start
        run: |
          cd backend && uv sync
          uv run flask run --port 5001 &
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: https://api.anthropic.com/v1/
          LLM_MODEL_NAME: claude-haiku-4-5-20251001
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: mirofish_neo4j

      - name: Install frontend + start
        run: |
          cd frontend && npm ci && npm run dev &
          sleep 5

      - name: Install E2E deps + browsers
        run: |
          cd e2e && uv sync
          uv run playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: https://api.anthropic.com/v1/
          LLM_MODEL_NAME: claude-haiku-4-5-20251001
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: mirofish_neo4j
        run: |
          cd e2e && uv run pytest -m "${{ inputs.tier || 'tier1' }}" \
            --screenshot=on --video=retain-on-failure \
            -v --tb=short

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            e2e/screenshots/
            e2e/test-results/
